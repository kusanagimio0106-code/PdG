  <title>Pole Dance Notebook</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
    :root {
      --bg: #0e0a14; --surface: #1a1225; --border: #2e2040;
      --pink: #e84393; --pink-soft: #f472b6; --rose: #ff3d6b;
      --purple: #a855f7; --yellow: #fbbf24;
      --text: #f0e8ff; --muted: #8b7aa8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* Loading */
    #ls {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 50; transition: opacity 0.4s;
    }
    #ls.hide { opacity: 0; pointer-events: none; }
    #ls img { width: 150px; height: 150px; object-fit: contain; }
    #ls p { margin-top: 14px; font-size: 13px; color: var(--muted); letter-spacing: 0.1em; }

    /* Modal overlay */
    #modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 12px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }
    #modal.open { display: flex; }
    .modal-box {
      background: #1a1225; border: 1px solid var(--border);
      border-radius: 20px; padding: 22px;
      width: 100%; max-width: 420px;
    }
    .modal-box h2 { font-size: 17px; font-weight: 700; margin-bottom: 18px; }

    /* Main app */
    .app { max-width: 420px; margin: 0 auto; padding: 24px 16px 60px; }
    .header { text-align: center; margin-bottom: 22px; }
    .header h1 {
      font-size: 22px; font-weight: 700; letter-spacing: 0.06em;
      background: linear-gradient(90deg, var(--rose), var(--pink-soft));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header p { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* Combo */
    .combo-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; margin-bottom: 14px;
    }
    .combo-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px; }
    .combo-row { display: flex; align-items: center; gap: 10px; min-height: 48px; margin-bottom: 8px; }
    .combo-row:last-child { margin-bottom: 0; }
    .combo-icon { font-size: 18px; flex-shrink: 0; }
    .combo-text { flex: 1; min-width: 0; }
    .combo-name { font-size: 15px; font-weight: 600; }
    .combo-name.empty { color: var(--muted); font-style: italic; font-weight: 400; font-size: 13px; }
    .combo-stars { font-size: 11px; color: var(--yellow); margin-top: 1px; }
    .combo-img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border); display: none; }
    .combo-img.show { display: block; }

    /* Buttons */
    .btn-primary {
      display: block; width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff; font-family: inherit; font-size: 15px; font-weight: 700;
      border: none; border-radius: 12px; cursor: pointer; text-align: center;
    }
    .divider { height: 1px; background: var(--border); margin: 18px 0; }
    .btn-outline {
      display: block; width: 100%; padding: 12px;
      background: transparent; color: var(--pink-soft);
      font-family: inherit; font-size: 14px; font-weight: 600;
      border: 1.5px solid var(--pink); border-radius: 12px; cursor: pointer; text-align: center;
    }
    .section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--muted); margin: 18px 0 10px; }

    /* Groups */
    .group { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
    .group-hdr { display: flex; align-items: center; justify-content: space-between; padding: 13px 15px; cursor: pointer; user-select: none; }
    .group-hdr-l { display: flex; align-items: center; gap: 8px; }
    .group-title { font-size: 15px; font-weight: 700; }
    .group-cnt { font-size: 11px; color: var(--muted); background: rgba(255,255,255,0.06); padding: 2px 7px; border-radius: 20px; }
    .group-arrow { color: var(--muted); font-size: 11px; transition: transform 0.2s; }
    .group.open .group-arrow { transform: rotate(180deg); }
    .group-body { display: none; border-top: 1px solid var(--border); }
    .group.open .group-body { display: block; }
    .trick-item { display: flex; align-items: center; padding: 11px 15px; border-bottom: 1px solid var(--border); gap: 10px; }
    .trick-item:last-child { border-bottom: none; }
    .trick-thumb { width: 46px; height: 46px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
    .trick-info { flex: 1; min-width: 0; }
    .trick-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .trick-stars { font-size: 11px; color: var(--yellow); margin-top: 1px; }
    .trick-acts { display: flex; gap: 2px; flex-shrink: 0; }
    .icon-btn { background: none; border: none; cursor: pointer; padding: 7px; border-radius: 8px; font-size: 15px; }
    .empty-group { padding: 16px; text-align: center; color: var(--muted); font-size: 13px; font-style: italic; }

    /* Modal fields */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.07em; margin-bottom: 5px; }
    .field input, .field select {
      width: 100%; padding: 11px 13px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: inherit; font-size: 15px; outline: none; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--pink); }
    .field select option { background: #1a1225; }
    .star-row { display: flex; gap: 4px; }
    .star-btn { font-size: 22px; background: none; border: none; cursor: pointer; padding: 3px; opacity: 0.25; }
    .star-btn.on { opacity: 1; }

    /* Photo */
    #input-photo { display: none; }
    .photo-trigger {
      display: block; width: 100%; padding: 14px;
      border: 1.5px dashed var(--border); border-radius: 10px;
      background: none; color: var(--muted);
      font-family: inherit; font-size: 13px; cursor: pointer; text-align: center;
    }
    .photo-preview-wrap { display: none; border-radius: 10px; overflow: hidden; position: relative; margin-top: 8px; }
    .photo-preview-wrap.show { display: block; }
    .photo-preview-wrap img { width: 100%; max-height: 150px; object-fit: cover; display: block; }
    .photo-remove {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,0.65); color: #fff; border: none;
      border-radius: 50%; width: 26px; height: 26px; font-size: 13px; cursor: pointer;
    }

    /* Modal actions */
    .modal-acts { display: flex; gap: 10px; margin-top: 18px; }
    .btn-cancel {
      flex: 1; padding: 12px; background: transparent; color: var(--muted);
      font-family: inherit; font-size: 14px; font-weight: 600;
      border: 1.5px solid var(--border); border-radius: 10px; cursor: pointer;
    }
    .btn-save {
      flex: 2; padding: 12px;
      background: linear-gradient(135deg, var(--pink), var(--rose));
      color: #fff; font-family: inherit; font-size: 15px; font-weight: 700;
      border: none; border-radius: 10px; cursor: pointer;
    }
  </style>
</head>

<script>
var KEY = 'pdance_v3';
var DEFAULT = [
  [{name:'Đi bộ quanh cột',difficulty:1},{name:'Xoay hông dạo đầu',difficulty:1}],
  [{name:'Superman',difficulty:4},{name:'Scorpio',difficulty:3}],
  [{name:'Floorwork',difficulty:2}]
];

function load() {
  try { var r = localStorage.getItem(KEY); if (r) return JSON.parse(r); } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT));
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(kho)); }
  catch(e) { alert('Lỗi lưu: ' + e.message); }
}

var kho = load();
var nStars = 3, editMode = false, editG = 0, editI = 0, photo = null;

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function starStr(n) { var s=''; for(var i=0;i<n;i++) s+='⭐'; return s; }

function renderAll() {
  for (var g=0; g<3; g++) {
    var items = kho[g];
    document.getElementById('gc'+g).textContent = items.length;
    var out = '';
    if (items.length === 0) {
      out = '<div class="empty-group">Chưa có trick nào. Thêm ngay!</div>';
    } else {
      for (var i=0; i<items.length; i++) {
        var it = items[i];
        var th = it.image ? '<img class="trick-thumb" src="'+it.image+'" alt="" />' : '';
        out += '<div class="trick-item">'+th
          +'<div class="trick-info"><div class="trick-name">'+esc(it.name)+'</div>'
          +'<div class="trick-stars">'+starStr(it.difficulty)+'</div></div>'
          +'<div class="trick-acts">'
          +'<button class="icon-btn" onclick="openEdit('+g+','+i+')">✏️</button>'
          +'<button class="icon-btn" onclick="delTrick('+g+','+i+')">🗑️</button>'
          +'</div></div>';
      }
    }
    document.getElementById('gb'+g).innerHTML = out;
  }
}

function toggleGroup(g) { document.getElementById('g'+g).classList.toggle('open'); }

function delTrick(g, i) {
  if (!confirm('Xóa "'+kho[g][i].name+'"?')) return;
  kho[g].splice(i,1); save(); renderAll();
}

function randomCombo() {
  for (var g=0;g<3;g++) {
    if (kho[g].length===0) {
      document.getElementById('cn1').textContent='⚠️ Hãy thêm đủ trick vào 3 nhóm!';
      return;
    }
  }
  for (var g=0;g<3;g++) {
    var it = kho[g][Math.floor(Math.random()*kho[g].length)];
    var ne = document.getElementById('cn'+g);
    ne.textContent = it.name; ne.classList.remove('empty');
    document.getElementById('cs'+g).textContent = starStr(it.difficulty);
    var ie = document.getElementById('ci'+g);
    if (it.image) { ie.src=it.image; ie.classList.add('show'); }
    else { ie.src=''; ie.classList.remove('show'); }
  }
}

function setStar(n) {
  nStars = n;
  var bs = document.querySelectorAll('.star-btn');
  for (var i=0;i<bs.length;i++) bs[i].classList.toggle('on', i<n);
}

function pickPhoto(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var img = new Image();
    img.onload = function() {
      var MAX=400, sc=Math.min(1,MAX/Math.max(img.width,img.height));
      var c=document.createElement('canvas');
      c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      photo = c.toDataURL('image/jpeg',0.75);
      document.getElementById('pimg').src = photo;
      document.getElementById('ppw').classList.add('show');
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function clearPhoto() {
  photo = null;
  document.getElementById('input-photo').value='';
  document.getElementById('pimg').src='';
  document.getElementById('ppw').classList.remove('show');
}

function openAdd() {
  editMode=false;
  document.getElementById('mtitle').textContent='Thêm Trick Mới ⭐';
  document.getElementById('iname').value='';
  document.getElementById('igroup').value='0';
  setStar(3); clearPhoto();
  document.getElementById('modal').classList.add('open');
}

function openEdit(g, i) {
  editMode=true; editG=g; editI=i;
  var it=kho[g][i];
  document.getElementById('mtitle').textContent='Chỉnh Sửa Trick ✏️';
  document.getElementById('iname').value=it.name;
  document.getElementById('igroup').value=String(g);
  setStar(it.difficulty);
  if (it.image) {
    photo=it.image;
    document.getElementById('pimg').src=it.image;
    document.getElementById('ppw').classList.add('show');
  } else { clearPhoto(); }
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
function bgClick(e) { if(e.target.id==='modal') closeModal(); }

function saveTrick() {
  var name = document.getElementById('iname').value.trim();
  if (!name) { document.getElementById('iname').focus(); return; }
  var g = parseInt(document.getElementById('igroup').value);
  var entry = {name:name, difficulty:nStars};
  if (photo) entry.image = photo;
  if (editMode) {
    if (editG!==g) { kho[editG].splice(editI,1); kho[g].push(entry); }
    else { kho[g][editI]=entry; }
  } else {
    kho[g].push(entry);
  }
  save(); renderAll(); closeModal();
}

// Loading screen
setTimeout(function() {
  var ls=document.getElementById('ls');
  ls.classList.add('hide');
  setTimeout(function(){ls.style.display='none';},450);
}, 2000);

renderAll();
</script>
